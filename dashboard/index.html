<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WearCam</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>WearCam</h1>
    <nav class="tabs" role="tablist">
      <button class="tab" id="tab-live"  role="tab" data-tab="live"  aria-selected="true">Live</button>
      <button class="tab" id="tab-setup" role="tab" data-tab="setup" aria-selected="false">Setup (Bluetooth)</button>
    </nav>
    <span id="conn" class="pill">…</span>
  </header>

  <section id="live-panel" role="tabpanel" hidden>
    <p id="live-notice" class="notice" hidden></p>
    <form id="open-form" class="open-form" hidden>
      <label>Device IP <input id="device-ip" placeholder="192.168.1.42" inputmode="decimal" autocomplete="off" /></label>
      <button type="submit">Open device →</button>
    </form>
    <div id="live-ui">
      <div class="video-wrap"><img id="stream" alt="live stream" /></div>
      <div class="controls">
        <button id="snap">Snapshot</button>
        <button id="clip">Download last 60s</button>
        <button id="toggle">Pause</button>
      </div>
      <form id="config-form" class="grid">
        <label>Resolution
          <select id="res">
            <option value="QVGA">QVGA 320×240</option>
            <option value="VGA">VGA 640×480</option>
            <option value="SVGA" selected>SVGA 800×600</option>
            <option value="HD">HD 1280×720</option>
          </select>
        </label>
        <label>FPS <input id="fps" type="number" min="1" max="30" value="20" /></label>
        <label>Quality <input id="quality" type="number" min="4" max="63" value="12" /></label>
        <button type="submit">Apply</button>
      </form>
      <pre id="status" class="status"></pre>
    </div>
  </section>

  <section id="ble-panel" role="tabpanel" hidden>
    <h2>Setup (Bluetooth)</h2>
    <p class="hint">Provision WiFi over Bluetooth, then open the device.</p>
    <p id="ble-notice" class="notice" hidden></p>
    <div id="ble-ui">
      <button id="ble-connect">Connect device</button>
      <form id="wifi-form" hidden>
        <input id="ssid" placeholder="WiFi SSID" autocomplete="off" />
        <input id="pass" placeholder="WiFi password" type="password" />
        <button type="submit">Send credentials</button>
      </form>
      <p id="ble-status"></p>
      <a id="open-device" hidden>Open device dashboard →</a>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
